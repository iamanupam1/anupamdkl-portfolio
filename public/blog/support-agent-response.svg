<svg width="1000" height="600" viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f7ff"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1000" height="600" fill="url(#bg2)" rx="40"/>
  <rect x="60" y="60" width="880" height="520" rx="32" fill="#ffffff" stroke="#dbe9ff" stroke-width="5"/>
  <text x="90" y="120" font-family="Inter, Arial, sans-serif" font-size="32" fill="#1c3d72">Sample Agent Response</text>
  <rect x="90" y="160" width="820" height="130" rx="20" fill="#f0f8ff" stroke="#bad4ff" stroke-width="3"/>
  <text x="110" y="210" font-family="Inter, Arial, sans-serif" font-size="18" fill="#1e425f">Customer:</text>
  <text x="110" y="240" font-family="Inter, Arial, sans-serif" font-size="20" fill="#2d4668">"I need help tracking my order and requesting a refund."</text>
  <rect x="90" y="320" width="820" height="180" rx="20" fill="#f7ffef" stroke="#d8f6d8" stroke-width="3"/>
  <text x="110" y="365" font-family="Inter, Arial, sans-serif" font-size="18" fill="#1d4d2d">Agent:</text>
  <text x="110" y="395" font-family="Inter, Arial, sans-serif" font-size="20" fill="#2d6134">"Order #2398 is estimated to arrive on Tuesday. Your purchase is eligible for a full refund within 14 days. Would you like me to start the refund process?"</text>
  <text x="110" y="455" font-family="Inter, Arial, sans-serif" font-size="18" fill="#1d4d2d">Highlights:</text>
  <text x="130" y="485" font-family="Inter, Arial, sans-serif" font-size="16" fill="#4f6b42">• Order status lookup</text>
  <text x="130" y="510" font-family="Inter, Arial, sans-serif" font-size="16" fill="#4f6b42">• Refund eligibility detection</text>
  <text x="130" y="535" font-family="Inter, Arial, sans-serif" font-size="16" fill="#4f6b42">• Conversational follow-up prompt</text>
</svg>